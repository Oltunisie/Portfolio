<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <!-- Background -->
  <rect width="280" height="280" rx="36" fill="#03101e"/>

  <!-- Star field -->
  <circle cx="15"  cy="18"  r=".7" fill="white" opacity=".2"/>
  <circle cx="55"  cy="10"  r=".5" fill="white" opacity=".15"/>
  <circle cx="100" cy="26"  r=".8" fill="white" opacity=".22"/>
  <circle cx="152" cy="12"  r=".6" fill="white" opacity=".18"/>
  <circle cx="198" cy="20"  r=".9" fill="white" opacity=".2"/>
  <circle cx="258" cy="35"  r=".6" fill="white" opacity=".15"/>
  <circle cx="22"  cy="90"  r=".6" fill="white" opacity=".16"/>
  <circle cx="268" cy="108" r=".7" fill="white" opacity=".18"/>
  <circle cx="10"  cy="210" r=".8" fill="white" opacity=".2"/>
  <circle cx="40"  cy="245" r=".5" fill="white" opacity=".14"/>
  <circle cx="115" cy="258" r=".7" fill="white" opacity=".18"/>
  <circle cx="185" cy="242" r=".6" fill="white" opacity=".16"/>
  <circle cx="255" cy="220" r=".8" fill="white" opacity=".2"/>
  <circle cx="270" cy="170" r=".5" fill="white" opacity=".14"/>
  <circle cx="132" cy="20"  r="1.1" fill="white" opacity=".32"/>
  <circle cx="18"  cy="160" r="1"   fill="#aad0ff" opacity=".38"/>
  <circle cx="262" cy="60"  r="1.1" fill="#aad0ff" opacity=".32"/>
  <circle cx="240" cy="250" r="1"   fill="#ffcc88" opacity=".32"/>

  <!-- ORBIT 1 — wide equatorial ellipse, white, tilted 15° -->
  <path d="M 37,100 A 103,38 15 0 1 243,180" fill="none" stroke="white" stroke-width="1.3" opacity=".22"/>
  <path d="M 37,100 A 103,38 15 0 0 243,180" fill="none" stroke="white" stroke-width="1.3" opacity=".82"/>

  <!-- ORBIT 2 — tall polar ellipse, blue, tilted 75° -->
  <path d="M 108,18 A 38,95 75 0 1 172,262" fill="none" stroke="#4A9EFF" stroke-width="1.2" opacity=".22"/>
  <path d="M 108,18 A 38,95 75 0 0 172,262" fill="none" stroke="#4A9EFF" stroke-width="1.2" opacity=".8"/>

  <!-- ORBIT 3 — medium retrograde, lavender dashed, tilted -30° -->
  <path d="M 70,78 A 72,26 -30 0 1 210,202" fill="none" stroke="#a080ff" stroke-width=".9" opacity=".18" stroke-dasharray="5,4"/>
  <path d="M 70,78 A 72,26 -30 0 0 210,202" fill="none" stroke="#a080ff" stroke-width=".9" opacity=".58" stroke-dasharray="5,4"/>

  <!-- PLANET -->
  <circle cx="140" cy="140" r="38" fill="#091d38"/>
  <circle cx="140" cy="140" r="38" fill="none" stroke="#4A9EFF" stroke-width="4"   opacity=".06"/>
  <circle cx="140" cy="140" r="38" fill="none" stroke="#4A9EFF" stroke-width="1.2" opacity=".14"/>
  <ellipse cx="130" cy="128" rx="12" ry="7"  fill="#112d56" opacity=".75"/>
  <ellipse cx="152" cy="148" rx="10" ry="6"  fill="#112d56" opacity=".6"/>
  <ellipse cx="128" cy="152" rx="7"  ry="4"  fill="#112d56" opacity=".5"/>
  <ellipse cx="150" cy="122" rx="5"  ry="3"  fill="#112d56" opacity=".45"/>
  <ellipse cx="140" cy="103" rx="10" ry="4.5" fill="#c8ddf4" opacity=".2"/>
  <path d="M 112,112 Q 108,140 116,168" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity=".04"/>

  <!-- INTERSECTION NODES — orbit1 × orbit2 -->
  <circle cx="114" cy="82"  r="6"   fill="#4A9EFF" opacity=".1"/>
  <circle cx="114" cy="82"  r="3.5" fill="#4A9EFF" opacity=".3"/>
  <circle cx="114" cy="82"  r="1.8" fill="white"   opacity=".92"/>
  <circle cx="166" cy="196" r="6"   fill="#4A9EFF" opacity=".1"/>
  <circle cx="166" cy="196" r="3.5" fill="#4A9EFF" opacity=".3"/>
  <circle cx="166" cy="196" r="1.8" fill="white"   opacity=".92"/>

  <!-- INTERSECTION NODES — orbit1 × orbit3 -->
  <circle cx="75"  cy="82"  r="4"   fill="#a080ff" opacity=".12"/>
  <circle cx="75"  cy="82"  r="2.2" fill="#a080ff" opacity=".42"/>
  <circle cx="75"  cy="82"  r="1.2" fill="white"   opacity=".78"/>
  <circle cx="205" cy="196" r="4"   fill="#a080ff" opacity=".12"/>
  <circle cx="205" cy="196" r="2.2" fill="#a080ff" opacity=".42"/>
  <circle cx="205" cy="196" r="1.2" fill="white"   opacity=".78"/>

  <!-- SATELLITE on orbit 1 -->
  <g transform="rotate(15,44,108)">
    <rect x="37"  y="104" width="14" height="8" rx="2" fill="white"/>
    <rect x="23"  y="105" width="12" height="6" rx="1" fill="#4A9EFF" opacity=".85"/>
    <line x1="29" y1="105" x2="29" y2="111" stroke="#1a3a6a" stroke-width=".5"/>
    <line x1="23" y1="108" x2="35" y2="108" stroke="#1a3a6a" stroke-width=".5"/>
    <rect x="51"  y="105" width="12" height="6" rx="1" fill="#4A9EFF" opacity=".85"/>
    <line x1="57" y1="105" x2="57" y2="111" stroke="#1a3a6a" stroke-width=".5"/>
    <line x1="51" y1="108" x2="63" y2="108" stroke="#1a3a6a" stroke-width=".5"/>
    <line x1="44" y1="104" x2="44" y2="96" stroke="white" stroke-width=".8" stroke-linecap="round"/>
    <circle cx="44" cy="95" r="1.5" fill="#4A9EFF"/>
  </g>
  <line x1="52"  y1="115" x2="58"  y2="122" stroke="white" stroke-width=".6" stroke-linecap="round" opacity=".28"/>
  <line x1="55"  y1="112" x2="62"  y2="120" stroke="white" stroke-width=".4" stroke-linecap="round" opacity=".16"/>

  <!-- SMALL PROBE on orbit 3 -->
  <circle cx="196" cy="66" r="4"   fill="#e0e4f0"/>
  <rect   x="200" y="64" width="10" height="4" rx="1" fill="#a080ff" opacity=".8"/>
  <line x1="196" y1="64" x2="196" y2="58" stroke="white" stroke-width=".7" stroke-linecap="round" opacity=".6"/>
  <circle cx="196" cy="57" r="1.2" fill="#a080ff" opacity=".8"/>
</svg>
